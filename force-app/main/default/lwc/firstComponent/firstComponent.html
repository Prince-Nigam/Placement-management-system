<template>

    <template for:each={students} for:item="student">
        <lightning-card title={student.name} key={student.id}>
            <p class="slds-p-horizontal_small">My id is: {student.id}</p>
            <lightning-button label="Check Eligibility" slot="actions" onclick={checkIfEligible}></lightning-button>

            <template lwc:if={isExecuted}>
                <template lwc:if={student.isEligible}>
                    <p>My CGPA is : {student.cgpa} and I am Eligible</p>
                </template>
                <template lwc:else>
                    <p>My CGPA is : {student.cgpa} and I am notEligible</p>
                </template>
            </template>
        </lightning-card>
    </template>

</template>
